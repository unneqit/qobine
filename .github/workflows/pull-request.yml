name: On Pull Request To Main
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "**.rs"
      - "**.html"
      - "**/Cargo.lock"
      - "**/Cargo.toml"
      - ".github/**"
  push:
    branches:
      - main
    paths:
      - "**.rs"
      - "**.html"
      - "**/Cargo.lock"
      - "**/Cargo.toml"
      - ".github/**"

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: npm
          cache-dependency-path: qobuz-player-web/package-lock.json

      - name: Web install dependencies 
        working-directory: qobuz-player-web
        run: npm i

      - name: Web format check
        working-directory: qobuz-player-web
        run: npm run format:check

      - name: Check format
        run: cargo fmt --check

  pre-merge:
    name: Pre-merge checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update apt
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update

      - name: Install dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Test 
        run: cargo test --workspace --exclude qobuz-player-client --exclude qobuz-player-gtk

      - name: Build gpio 
        if: startsWith(matrix.os, 'ubuntu')
        run: cargo build --workspace --features gpio --exclude qobuz-player-gtk

  build-flatpak:
    name: "Flatpak ${{ matrix.variant.arch }}"
    runs-on: ${{ matrix.variant.runner }}

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: qobuz-player-${{ matrix.variant.arch }}.flatpak
          manifest-path: io.github.sofusa.qobine.json
          cache-key: flatpak-builder-${{ matrix.variant.arch }}-${{ github.sha }}
          arch: ${{ matrix.variant.arch }}
