name: Create release, build and upload artifacts

permissions:
  contents: write

on:
  push:
    tags:
      - v*

jobs:
  build-and-upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            features: "gpio"
          - os: macos-latest
            target: x86_64-apple-darwin
            features: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            features: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: ""
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            features: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak and GNOME SDK
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Sdk//49 org.gnome.Platform//49

      - name: Install dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Build and upload tui
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: qobine-tui
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload qobine-web
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: qobine-web
          target: ${{ matrix.target }}
          features: ${{ matrix.features || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload qobine-rfid
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: qobine-rfid
          target: ${{ matrix.target }}
          features: ${{ matrix.features || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload qobine-connect
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: qobine-connect
          target: ${{ matrix.target }}
          features: ${{ matrix.features || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload qobine-disconnect-server
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: disconnect-server
          target: ${{ matrix.target }}
          features: ${{ matrix.features || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}

  flatpak:
    name: "Flatpak ${{ matrix.variant.arch }}"
    runs-on: ${{ matrix.variant.runner }}

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: qobine-${{ matrix.variant.arch }}.flatpak
          manifest-path: io.github.sofusa.qobine.json
          cache-key: flatpak-builder-${{ matrix.variant.arch }}-${{ github.sha }}
          arch: ${{ matrix.variant.arch }}

      - name: Upload Flatpak
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: qobine-${{ matrix.variant.arch }}.flatpak
