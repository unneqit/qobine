<div
  class="w-full"
  hx-trigger="tracklist"
  hx-target="this"
  data-sse="tracklist"
  hx-swap="outerHTML"
  hx-get="/playlist/{{ playlist.id }}/tracks"
  id="tracks"
>
  @defer (
    list-tracks.html;
    now_playing_id=playing_info.now_playing_id;
    tracks=playlist.tracks;
    show_artist=true;
    show_track_cover=true;
    click=click;
    playing_index=playing_index;
    use_playing_index=use_playing_index
  ) {}
</div>
